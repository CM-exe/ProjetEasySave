  namespace: ProjetEasySave.Model
  summary: Synchronously executes the backup operation using the configured strategy.
  example: []
  syntax:
    content: public bool save(string sourceFolder, string destinationFolder, List<string> priorityExt, CancellationToken token, ManualResetEventSlim pauseEvent, Action<int, string>? progress)
    parameters:
    - id: sourceFolder
      type: System.String
      description: The absolute path of the directory to back up.
    - id: destinationFolder
      type: System.String
      description: The absolute path where the backup will be saved.
    - id: priorityExt
      type: System.Collections.Generic.List{System.String}
      description: A list of file extensions that should be processed with higher priority.
    - id: token
      type: System.Threading.CancellationToken
      description: A cancellation token to handle explicit stop requests.
    - id: pauseEvent
      type: System.Threading.ManualResetEventSlim
      description: A manual reset event to manage pausing and resuming the backup process.
    - id: progress
      type: System.Action{System.Int32,System.String}
      description: An action delegate to report progress updates back to the UI.
    return:
      type: System.Boolean
      description: <code>true</code> if the backup completes successfully; otherwise, <code>false</code>.
