  assemblies:
  - EasySaveWPF
  namespace: ProjetEasySave.Model
  summary: Asynchronously executes the backup operation using the configured strategy by running it on a background thread.
  example: []
  syntax:
    content: public Task<bool> saveAsync(string sourceFolder, string destinationFolder, List<string> priorityExt, CancellationToken token, ManualResetEventSlim pauseEvent, Action<int, string>? progress = null)
    parameters:
    - id: sourceFolder
      type: System.String
      description: The absolute path of the directory to back up.
    - id: destinationFolder
      type: System.String
      description: The absolute path where the backup will be saved.
    - id: priorityExt
      type: System.Collections.Generic.List{System.String}
      description: A list of file extensions that should be processed with higher priority.
    - id: token
      type: System.Threading.CancellationToken
      description: A cancellation token to handle explicit stop requests.
    - id: pauseEvent
      type: System.Threading.ManualResetEventSlim
      description: A manual reset event to manage pausing and resuming the backup process.
    - id: progress
      type: System.Action{System.Int32,System.String}
      description: An action delegate to report progress updates back to the UI (optional).
    return:
      type: System.Threading.Tasks.Task{System.Boolean}
      description: A task representing the asynchronous save operation, containing a boolean result of success or failure.
    content.vb: Public Function saveAsync(sourceFolder As String, destinationFolder As String, priorityExt As List(Of String), token As CancellationToken, pauseEvent As ManualResetEventSlim, progress As Action(Of Integer, String) = Nothing) As Task(Of Boolean)
