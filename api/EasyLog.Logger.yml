  assemblies:
  - EasyLog
  namespace: EasyLog
  summary: >-
    Records a historical log entry. It appends the log to a local daily file and/or sends it to the remote server, 

    depending on the active configuration settings.
  example: []
  syntax:
    content: public bool log(Dictionary<string, string> message)
    parameters:
    - id: message
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: A dictionary containing the key-value pairs representing the log data.
    return:
      type: System.Boolean
      description: <code>true</code> if the log was successfully recorded/sent everywhere it was supposed to go; otherwise, <code>false</code>.
