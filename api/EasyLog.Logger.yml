  assemblies:
  - EasyLog
  namespace: EasyLog
  summary: >-
    Records a real-time log entry by completely overwriting the target file.

    This is used to maintain a constant "current state" of the application for external monitoring tools.
  example: []
  syntax:
    content: public bool logRealTime(Dictionary<string, string> message)
    parameters:
    - id: message
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: A dictionary containing the state data.
    return:
      type: System.Boolean
      description: <code>true</code> if the file was successfully overwritten; otherwise, <code>false</code>.
