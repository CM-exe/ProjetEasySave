  assemblies:
  - EasySaveWPF
  namespace: ProjetEasySave.Model
  summary: Represents the differential backup strategy implementation of the <xref href="ProjetEasySave.Model.ISaveStrategy" data-throw-if-not-resolved="false"></xref> interface.
  remarks: >-
    This strategy compares the source directory against a previously completed full backup. 

    It only copies files that are new or have been modified since that full backup. 

    It handles large files, encryption, and pauses when restricted business software is running.
  example: []
  syntax:
    content: 'public class DifferentialSave : ISaveStrategy'
    content.vb: Public Class DifferentialSave Implements ISaveStrategy
