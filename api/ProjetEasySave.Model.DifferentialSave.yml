  assemblies:
  - EasySaveWPF
  namespace: ProjetEasySave.Model
  summary: >-
    Executes the differential backup process. Compares the source with the full backup, 

    isolates modified or new files, and copies them to the destination.
  example: []
  syntax:
    content: public bool doSave(string sourcePath, string destinationPath, List<string> priorityExt, CancellationToken token, ManualResetEventSlim pauseEvent, Action<int, string> progress)
    parameters:
    - id: sourcePath
      type: System.String
      description: The path of the directory to be backed up.
    - id: destinationPath
      type: System.String
      description: The path where the differential backup will be stored.
    - id: priorityExt
      type: System.Collections.Generic.List{System.String}
      description: A list of extensions dictating which files should be processed first.
    - id: token
      type: System.Threading.CancellationToken
      description: A cancellation token to handle stop requests mid-process.
    - id: pauseEvent
      type: System.Threading.ManualResetEventSlim
      description: A manual reset event to handle pause and resume functionalities.
    - id: progress
      type: System.Action{System.Int32,System.String}
      description: An action delegate used to push progress percentage updates and filenames to the UI thread.
    return:
      type: System.Boolean
      description: <code>true</code> if the save process successfully completed; otherwise, <code>false</code>.
    content.vb: Public Function doSave(sourcePath As String, destinationPath As String, priorityExt As List(Of String), token As CancellationToken, pauseEvent As ManualResetEventSlim, progress As Action(Of Integer, String)) As Boolean
