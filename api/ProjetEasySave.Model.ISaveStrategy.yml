  assemblies:
  - EasySaveWPF
  namespace: ProjetEasySave.Model
  summary: Executes the core backup operation according to the specific rules of the implemented strategy.
  example: []
  syntax:
    content: bool doSave(string sourcePath, string destinationPath, List<string> priorityExt, CancellationToken token, ManualResetEventSlim pauseEvent, Action<int, string> progress)
    parameters:
    - id: sourcePath
      type: System.String
      description: The source directory path that contains the files to be backed up.
    - id: destinationPath
      type: System.String
      description: The destination directory path where the backup will be stored.
    - id: priorityExt
      type: System.Collections.Generic.List{System.String}
      description: A list of file extensions dictating which files should be transferred first.
    - id: token
      type: System.Threading.CancellationToken
      description: A cancellation token used to safely abort the backup process.
    - id: pauseEvent
      type: System.Threading.ManualResetEventSlim
      description: A manual reset event used to block or unblock the thread for pause/resume functionality.
    - id: progress
      type: System.Action{System.Int32,System.String}
      description: An action delegate to report the overall completion percentage and the name of the file currently being processed.
    return:
      type: System.Boolean
      description: <code>true</code> if the backup completes successfully; otherwise, <code>false</code>.
    content.vb: Function doSave(sourcePath As String, destinationPath As String, priorityExt As List(Of String), token As CancellationToken, pauseEvent As ManualResetEventSlim, progress As Action(Of Integer, String)) As Boolean
