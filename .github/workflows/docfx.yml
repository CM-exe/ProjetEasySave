name: Build and Publish DocFX Docs

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  docfx:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0'

      - name: Install DocFX
        run: dotnet tool install --global docfx --version 2.78.4
        
      - name: Update Path for DocFX
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore NuGet packages
        run: dotnet restore EasySaveWPF/EasySaveWPF.slnx

      - name: Build all projects with XML docs
        run: dotnet build EasySaveWPF/EasySaveWPF.slnx -c Release /p:GenerateDocumentationFile=true

      - name: Generate DocFX documentation
        run: docfx docfx.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site